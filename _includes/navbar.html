<script>
(function() {
  var toggle   = document.getElementById('navToggle');
  var menu     = document.getElementById('mobileMenu');
  var overlay  = document.getElementById('mobileOverlay');

  function openMenu() {
    toggle.classList.add('open');
    menu.classList.add('open');
    overlay.classList.add('open');
    toggle.setAttribute('aria-expanded', 'true');
    document.body.style.overflow = 'hidden';
  }

  function closeMenu() {
    toggle.classList.remove('open');
    menu.classList.remove('open');
    overlay.classList.remove('open');
    toggle.setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
  }

  if (toggle) {
    toggle.addEventListener('click', function() {
      if (menu.classList.contains('open')) { closeMenu(); } else { openMenu(); }
    });
  }

  if (overlay) {
    overlay.addEventListener('click', closeMenu);
  }

  // Mobile About dropdown
  var aboutToggle = document.getElementById('mobileAboutToggle');
  var aboutMenu   = document.getElementById('mobileAboutMenu');
  if (aboutToggle && aboutMenu) {
    aboutToggle.addEventListener('click', function() {
      var isOpen = aboutMenu.classList.toggle('open');
      aboutToggle.classList.toggle('open', isOpen);
      aboutToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
  }

  // Close menu on nav link click
  var mobileLinks = document.querySelectorAll('.mobile-nav-link, .mobile-dropdown-link');
  mobileLinks.forEach(function(link) {
    link.addEventListener('click', closeMenu);
  });
})();
</script>
